<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Metin2 Server - Kayıt Ol</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="topbar">
    <div class="container nav">
      <div class="logo">METIN2 <span>SERVER</span></div>

      <nav class="menu">
        <a href="index.html">Ana Sayfa</a>
        <a href="kayit.html" class="active">Kayıt Ol</a>
        <a href="indir.html">İndir</a>
      </nav>
    </div>
  </header>

  <section class="sub-hero">
    <div class="sub-hero-overlay"></div>
    <div class="container sub-hero-content">
      <span class="mini-title">Hesap Oluştur</span>
      <h1>Kayıt Ol</h1>
      <p>Yeni bir karakter yarat ve savaş dünyasına giriş yap.</p>
    </div>
  </section>

  <section class="form-section">
    <div class="container">
      <div class="form-box">
        <h2>Oyuncu Kayıt Formu</h2>
        <p class="form-desc">Bilgilerini eksiksiz doldur ve maceraya başla.</p>

        <form>
          <div class="form-group">
            <label for="username">Kullanıcı Adı</label>
            <input type="text" id="username" placeholder="Kullanıcı adını gir">
          </div>

          <div class="form-group">
            <label for="email">E-posta</label>
            <input type="email" id="email" placeholder="E-posta adresini gir">
          </div>

          <div class="form-group">
            <label for="password">Şifre</label>
            <input type="password" id="password" placeholder="Şifreni gir">
          </div>

          <div class="form-group">
            <label for="password2">Şifre Tekrar</label>
            <input type="password" id="password2" placeholder="Şifreni tekrar gir">
          </div>

          <button type="submit" class="btn btn-gold full">Kayıt Ol</button>
        </form>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="copyright">
      © 2026 Metin2 Server - Tüm hakları saklıdır.
    </div>
  </footer>

</body>
</html>
